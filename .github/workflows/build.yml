name: Build ImmortalWrt for x86_64

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-23.05
  TARGET: x86
  SUBTARGET: 64
  CONFIG_FILE: configs/x86_64.config
  MAKE_JOBS: 2

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Free Disk Space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          df -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev libxml2-dev make ninja-build p7zip-full \
            patch python2.7 python3 python3-dev python3-pip python3-setuptools \
            python3-distutils rsync unzip wget zlib1g-dev

      - name: Clone ImmortalWrt Source
        run: |
          git clone --single-branch --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} immortalwrt
          cd immortalwrt
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        id: clone

      - name: Update Feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy Configuration
        run: |
          cp ${{ env.CONFIG_FILE }} immortalwrt/.config
          cd immortalwrt
          make defconfig

      - name: Download DL Package
        run: |
          cd immortalwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;

      - name: Build Firmware
        run: |
          cd immortalwrt
          echo "=== Build Started ==="
          echo "Disk space before build:"
          df -h .
          echo ""
          echo "Starting make -j${{ env.MAKE_JOBS }}..."
          
          # 设置下载重试
          export CONFIG_SCC_URI="https://github.com/immortalwrt/packages.git"
          
          # 开始编译
          make -j${{ env.MAKE_JOBS }} V=s 2>&1 | tee build.log
          BUILD_STATUS=${PIPESTATUS[0]}
          
          echo ""
          echo "=== Build Finished ==="
          echo "Exit code: $BUILD_STATUS"
          echo "Disk space after build:"
          df -h .
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo ""
            echo "=== BUILD FAILED ==="
            echo "Searching for errors..."
            grep -i "error" build.log | tail -50
            echo ""
            echo "Last 300 lines of log:"
            tail -300 build.log
            exit $BUILD_STATUS
          fi
          
          echo "status=success" >> $GITHUB_OUTPUT
        id: build

      - name: Prepare Artifacts
        run: |
          cd immortalwrt
          mkdir -p upload
          cp bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.gz upload/ 2>/dev/null || true
          cp bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.vmdk upload/ 2>/dev/null || true
          cp bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.qcow2 upload/ 2>/dev/null || true
          cp .config upload/build.config
          sha256sum upload/* > upload/SHA256SUMS

      - name: Upload to Releases
        uses: softprops/action-gh-release@v2
        with:
          files: immortalwrt/upload/*
          tag_name: immortalwrt-x86_64-${{ steps.clone.outputs.version }}
          name: ImmortalWrt x86_64 ${{ steps.clone.outputs.version }}
          body: |
            ## ImmortalWrt for Intel N100 (x86_64)
            
            **Build Date:** ${{ github.event.head_commit.timestamp || github.event.pull_request.merged_at || 'Manual build' }}
            **Source Commit:** ${{ steps.clone.outputs.commit }}
            
            ### Files
            - *.gz - Combined image (recommended)
            - *.vmdk - VMware image
            - *.qcow2 - QEMU/KVM image
            - build.config - Build configuration
            - SHA256SUMS - Checksums
            
            ### Installation
            1. Download the .gz image
            2. Extract and write to USB drive
            3. Boot from the drive
            4. Default IP: 192.168.10.4
          draft: false
          prerelease: false
          make_latest: true
        if: github.event_name != 'pull_request'

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86_64-${{ github.run_number }}
          path: immortalwrt/upload/*
          retention-days: 30

      - name: Cleanup
        run: |
          rm -rf immortalwrt
          df -h
