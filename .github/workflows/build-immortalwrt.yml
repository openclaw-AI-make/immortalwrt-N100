name: Build ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'ImmortalWrt branch'
        required: true
        default: 'openwrt-23.05'
        type: choice
        options:
          - openwrt-23.05
          - openwrt-21.02
          - master

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_SH: diy-part.sh
  CACHE_DIR: ~/.cache/opkg

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Initialize Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y build-essential clang flex bison \
            g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3-pyelftools rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Cache Download
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CACHE_DIR }}
            dl
          key: immortalwrt-${{ github.sha }}
          restore-keys: |
            immortalwrt-
      - name: Clone Source
        id: clone
        run: |
          set +e  # Disable exit on error
          
          git clone --depth 1 --single-branch \
            -b openwrt-23.05 \
            https://github.com/immortalwrt/immortalwrt immortalwrt
          
          cd immortalwrt
          
          # Disable problematic feeds BEFORE update to prevent exit code 8
          echo "=== Disabling problematic feeds (telephony + routing) ==="
          sed -i 's/^src-git telephony/#src-git telephony/' feeds.conf.default
          sed -i 's/^src-git routing/#src-git routing/' feeds.conf.default
          
          # Update feeds (problematic feeds excluded)
          echo "=== Updating feeds ==="
          ./scripts/feeds update -a
          echo "Feeds update exit code: $?"
          
          # Copy config
          [ -f ${{ env.CONFIG_FILE }} ] && cp -f ${{ env.CONFIG_FILE }} .config
          
          # Run customization script
          [ -f ${{ env.DIY_SH }} ] && bash ${{ env.DIY_SH }}
          
          # Download mihomo cores (optimal solution for OpenClash)
          mkdir -p files/etc/openclash/core
          wget -qO files/etc/openclash/core/clash.meta.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.18.0/mihomo-linux-amd64-v1.18.0.gz
          gunzip files/etc/openclash/core/clash.meta.gz
          chmod +x files/etc/openclash/core/clash.meta
          wget -qO files/etc/openclash/core/clash.meta-alpha.gz https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-1.18.0-alpha.gz
          gunzip files/etc/openclash/core/clash.meta-alpha.gz
          chmod +x files/etc/openclash/core/clash.meta-alpha
          
          # Generate config if not exists
          make defconfig || echo "::warning::defconfig completed with warnings"

      - name: Build Firmware
        id: build
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        if: steps.build.outputs.status == 'success'
        with:
          name: immortalwrt-x86-64
          path: |
            immortalwrt/bin/targets/x86/64/*combined*
            immortalwrt/bin/targets/x86/64/*ext4*
          if-no-files-found: error

      - name: Create Release
        if: steps.build.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.run_id }}
          name: ImmortalWrt x86_64 ${{ github.event.inputs.branch }} ${{ github.run_number }}
          body: |
            ## Build Info
            - Branch: ${{ github.event.inputs.branch }}
            - Build Number: ${{ github.run_number }}
            - Run ID: ${{ github.run_id }}
            - Date: ${{ github.event.repository.updated_at }}
            
            ## Features
            - OpenClash (Meta Core + Premium Core pre-installed)
            - AdGuard Home
            - MosDNS v5
            - WireGuard
            - Full NAT support
            
            ## Flash Instructions
            1. Download `*combined-efi.img.gz` for UEFI systems
            2. Download `*combined-bios.img.gz` for Legacy BIOS systems
            3. Use `dd` or Rufus to write to USB/SSD
          files: |
            immortalwrt/bin/targets/x86/64/*combined*.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
