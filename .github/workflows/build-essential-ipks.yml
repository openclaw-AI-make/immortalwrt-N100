name: Build Essential IPKs

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-essential-ipks.yml'

jobs:
  build-ipks:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    
    - name: Free disk space
      run: |
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo docker image prune -af || true
        df -h
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential ccache curl git libssl-dev python3-distutils \
          rsync unzip wget time
    
    - name: Clone ImmortalWrt SDK (shallow)
      run: |
        git clone --depth=1 -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt.git sdk
        cd sdk
        ./scripts/feeds update -a 2>&1 | tail -5
        ./scripts/feeds install -a 2>&1 | tail -5
    
    - name: Clone essential packages
      run: |
        cd sdk
        
        # OpenClash
        echo "Cloning OpenClash..."
        git clone --depth=1 https://github.com/vernesong/OpenClash package/openclash 2>&1 | tail -3
        
        # AdGuard Home
        echo "Cloning AdGuard Home..."
        git clone --depth=1 https://github.com/rufengsuixing/luci-app-adguardhome package/luci-app-adguardhome 2>&1 | tail -3
        
        # Turbo ACC
        echo "Cloning Turbo ACC..."
        git clone --depth=1 -b luci https://github.com/chenmozhijin/turboacc.git package/turboacc 2>&1 | tail -3
        
        # frpc
        echo "Cloning frpc..."
        git clone --depth=1 https://github.com/kuoruan/openwrt-frp.git package/frp 2>&1 | tail -3
        git clone --depth=1 https://github.com/kuoruan/luci-app-frpc.git package/luci-app-frpc 2>&1 | tail -3
    
    - name: Configure for IPK build
      run: |
        cd sdk
        cat > .config << 'EOF'
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_PACKAGE_luci-app-openclash=y
CONFIG_PACKAGE_luci-app-adguardhome=y
CONFIG_PACKAGE_luci-app-turboacc=y
CONFIG_PACKAGE_frpc=y
CONFIG_PACKAGE_luci-app-frpc=y
CONFIG_PACKAGE_luci-i18n-frpc-zh-cn=y
CONFIG_ALL_NONSHARED=y
CONFIG_DEVEL=y
CONFIG_IB=y
EOF
    
    - name: Build IPK packages
      run: |
        cd sdk
        echo "Building IPKs..."
        make -j$(nproc) package/index || make -j1 package/index
        echo "Build complete!"
    
    - name: Collect IPK files
      run: |
        mkdir -p ipks
        cd sdk
        echo "Collecting IPKs..."
        find bin/packages/x86_64/ -name "*.ipk" -type f -exec cp {} ../ipks/ \; 2>/dev/null
        cd ../ipks
        echo "=== IPK Files ==="
        ls -lh *.ipk 2>/dev/null || echo "No IPK files found!"
        echo "Total: $(ls *.ipk 2>/dev/null | wc -l) files"
    
    - name: Upload IPKs
      uses: actions/upload-artifact@v6
      with:
        name: essential-ipks-x86-64
        path: ipks/*.ipk
        retention-days: 30
        if-no-files-found: warn
    
    - name: Create README
      run: |
        cat > ipks/README.md << 'EOF'
# Essential IPK Packages for ImmortalWrt 24.10.5 x86-64

## Included Packages

- luci-app-openclash (OpenClash)
- luci-app-adguardhome (AdGuard Home)
- luci-app-turboacc (Turbo ACC)
- frpc + luci-app-frpc (FRP Client)
- luci-i18n-frpc-zh-cn (Chinese language)

## Installation

1. Upload IPKs to router /tmp directory
2. SSH login: `ssh root@192.168.1.1`
3. Install: `opkg install /tmp/*.ipk`
4. Reboot: `reboot`

## Compatibility

- ImmortalWrt 24.10.5 x86-64
- OpenWrt 24.10.x x86-64
EOF
        cat ipks/README.md
    
    - name: Upload README
      uses: actions/upload-artifact@v6
      with:
        name: essential-ipks-readme
        path: ipks/README.md
        retention-days: 30
