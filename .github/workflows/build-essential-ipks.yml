name: Build Essential IPKs

on:
  workflow_dispatch:
  push:
    branches:
      - full-features-v2
    paths:
      - '.github/workflows/build-essential-ipks.yml'

jobs:
  build-ipks:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    
    - name: Free disk space
      run: |
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo docker image prune -af || true
        df -h
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential ccache curl git libssl-dev python3-distutils \
          rsync unzip wget time
    
    - name: Clone ImmortalWrt SDK
      run: |
        echo "Cloning SDK (this takes 5-10 minutes)..."
        git clone -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt.git sdk
        cd sdk
        echo "Updating feeds..."
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    
    - name: Clone essential packages
      run: |
        cd sdk
        
        # OpenClash
        echo "Cloning OpenClash..."
        git clone --depth=1 https://github.com/vernesong/OpenClash package/openclash 2>&1 | tail -3
        
        # AdGuard Home
        echo "Cloning AdGuard Home..."
        git clone --depth=1 https://github.com/rufengsuixing/luci-app-adguardhome package/luci-app-adguardhome 2>&1 | tail -3
        
        # Turbo ACC
        echo "Cloning Turbo ACC..."
        git clone --depth=1 -b luci https://github.com/chenmozhijin/turboacc.git package/turboacc 2>&1 | tail -3
        
        # frpc
        echo "Cloning frpc..."
        git clone --depth=1 https://github.com/kuoruan/openwrt-frp.git package/frp 2>&1 | tail -3
        git clone --depth=1 https://github.com/kuoruan/luci-app-frpc.git package/luci-app-frpc 2>&1 | tail -3
    
    - name: Configure for IPK build
      run: |
        cd sdk
        echo "Creating .config..."
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-adguardhome=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
        echo "CONFIG_PACKAGE_frpc=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-frpc=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-frpc-zh-cn=y" >> .config
        echo "CONFIG_ALL_NONSHARED=y" >> .config
        echo "CONFIG_DEVEL=y" >> .config
        echo "CONFIG_IB=y" >> .config
        cat .config
    
    - name: Build IPK packages
      run: |
        cd sdk
        echo "Building IPKs..."
        
        # 编译单个包（使用正确的包名）
        echo "Compiling OpenClash..."
        make package/OpenClash/compile || echo "OpenClash failed"
        
        echo "Compiling AdGuard Home..."
        make package/luci-app-adguardhome/compile || echo "AdGuard Home failed"
        
        echo "Compiling Turbo ACC..."
        make package/turboacc/compile || echo "Turbo ACC failed"
        
        echo "Compiling frp..."
        make package/frp/compile || echo "frp failed"
        make package/luci-app-frpc/compile || echo "luci-app-frpc failed"
        
        echo "Build complete!"
        
        # 检查是否生成了 IPK 文件
        echo "=== Checking for IPK files ==="
        find bin/ -name "*.ipk" -type f | head -20
    
    - name: Collect IPK files
      run: |
        mkdir -p ipks
        
        echo "=== Current directory ==="
        pwd
        ls -la
        
        echo "=== Searching for IPK files ==="
        # 查找所有 IPK 文件
        find . -name "*.ipk" -type f 2>/dev/null | head -20
        
        # 复制到 ipks 目录
        echo "Copying IPKs..."
        find . -name "*.ipk" -type f -exec cp {} ipks/ \; 2>/dev/null
        
        cd ipks
        echo "=== IPK Files Found ==="
        ls -lh *.ipk 2>/dev/null || echo "No IPK files found!"
        echo "Total: $(ls *.ipk 2>/dev/null | wc -l) files"
    
    - name: Upload IPKs
      uses: actions/upload-artifact@v6
      with:
        name: essential-ipks-x86-64
        path: ipks/*.ipk
        retention-days: 30
        if-no-files-found: warn
    
    - name: Create README
      run: |
        mkdir -p ipks
        echo "# Essential IPK Packages for ImmortalWrt 24.10.5 x86-64" > ipks/README.md
        echo "" >> ipks/README.md
        echo "## Included Packages" >> ipks/README.md
        echo "" >> ipks/README.md
        echo "- luci-app-openclash (OpenClash)" >> ipks/README.md
        echo "- luci-app-adguardhome (AdGuard Home)" >> ipks/README.md
        echo "- luci-app-turboacc (Turbo ACC)" >> ipks/README.md
        echo "- frpc + luci-app-frpc (FRP Client)" >> ipks/README.md
        echo "- luci-i18n-frpc-zh-cn (Chinese language)" >> ipks/README.md
        echo "" >> ipks/README.md
        echo "## Installation" >> ipks/README.md
        echo "" >> ipks/README.md
        echo "1. Upload IPKs to router /tmp directory" >> ipks/README.md
        echo "2. SSH login: ssh root@192.168.1.1" >> ipks/README.md
        echo "3. Install: opkg install /tmp/*.ipk" >> ipks/README.md
        echo "4. Reboot: reboot" >> ipks/README.md
        echo "" >> ipks/README.md
        echo "## Compatibility" >> ipks/README.md
        echo "" >> ipks/README.md
        echo "- ImmortalWrt 24.10.5 x86-64" >> ipks/README.md
        echo "- OpenWrt 24.10.x x86-64" >> ipks/README.md
        cat ipks/README.md
    
    - name: Upload README
      uses: actions/upload-artifact@v6
      with:
        name: essential-ipks-readme
        path: ipks/README.md
        retention-days: 30
