name: Build ImmortalWrt x86_64 (Image Builder)

on:
  workflow_dispatch:

env:
  IMMORTALWRT_VERSION: "24.10-SNAPSHOT"
  DEVICE_TARGET: x86
  DEVICE_SUBTARGET: 64
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /opt/ghc /usr/share/dotnet /usr/local/lib/android
          sudo docker image prune -af || true

      - name: Install dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 \
            qemu-utils genisoimage zstd

      - name: Download Image Builder
        run: |
          IB_URL="https://downloads.immortalwrt.org/releases/${{ env.IMMORTALWRT_VERSION }}/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}"
          IB_NAME="immortalwrt-imagebuilder-${{ env.IMMORTALWRT_VERSION }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}.Linux-x86_64"
          wget -q "${IB_URL}/${IB_NAME}.tar.zst"
          tar -I zstd -xf ${IB_NAME}.tar.zst
          mv ${IB_NAME} imagebuilder

      - name: Download packages
        run: |
          cd imagebuilder/packages
          
          # MosDNS (从官方源下载)
          MOSDNS_URL="https://downloads.immortalwrt.org/releases/${{ env.IMMORTALWRT_VERSION }}/packages/x86_64/packages/mosdns_5.3.3-r1_x86_64.ipk"
          wget -q "$MOSDNS_URL" && echo "✅ mosdns" || echo "❌ mosdns"
          
          # AdGuard Home 核心 (从官方源下载)
          ADGH_CORE_URL="https://downloads.immortalwrt.org/releases/${{ env.IMMORTALWRT_VERSION }}/packages/x86_64/packages/adguardhome_0.107.57-r1_x86_64.ipk"
          wget -q "$ADGH_CORE_URL" && echo "✅ adguardhome core" || echo "❌ adguardhome core"
          
          # AdGuard Home LuCI 界面 (使用 stevenjoezhang 的 v1.19)
          wget -q "https://github.com/stevenjoezhang/luci-app-adguardhome/releases/download/v1.19/luci-app-adguardhome_1.19_all.ipk" && echo "✅ luci-app-adguardhome v1.19" || echo "❌ luci-app-adguardhome"
          wget -q "https://github.com/stevenjoezhang/luci-app-adguardhome/releases/download/v1.19/luci-i18n-adguardhome-zh-cn_260130.50632_all.ipk" && echo "✅ 中文语言包" || echo "❌ 中文语言包"
          
          # Turbo ACC
          wget -q "https://raw.githubusercontent.com/wukongdaily/store/master/run/x86/luci-app-turboacc/luci-app-turboacc_26.177.43426-f6bddfc_all.ipk" && echo "✅ luci-app-turboacc" || echo "❌ luci-app-turboacc"
          
          echo "=== 下载的包 ==="
          ls -lh *.ipk 2>/dev/null || echo "无 ipk 文件"

      - name: Configure custom files
        run: |
          cd imagebuilder
          cp -rf $GITHUB_WORKSPACE/files .
          chmod +x $GITHUB_WORKSPACE/scripts/*.sh
          bash $GITHUB_WORKSPACE/scripts/customize.sh

      - name: Download OpenClash core
        run: |
          cd imagebuilder
          mkdir -p files/etc/openclash/core
          META_URL="https://raw.githubusercontent.com/vernesong/OpenClash/core/master/meta/clash-linux-amd64.tar.gz"
          wget -qO- $META_URL | tar xOvz > files/etc/openclash/core/clash_meta 2>/dev/null || true
          [ -f files/etc/openclash/core/clash_meta ] && chmod +x files/etc/openclash/core/clash_meta && echo "✅ OpenClash core" || echo "⚠️ OpenClash core 下载失败"
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -O files/etc/openclash/GeoIP.dat 2>/dev/null || true
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat -O files/etc/openclash/GeoSite.dat 2>/dev/null || true

      - name: Build firmware
        run: |
          cd imagebuilder
          CONFIG_PACKAGES=$(cat $GITHUB_WORKSPACE/config/packages.config | grep -v '^#' | grep -v '^$' | tr -s "\n" " ")
          echo "=== 安装的包 ==="
          echo "$CONFIG_PACKAGES"
          echo ""
          echo "=== 开始编译 ==="
          make image PROFILE="generic" PACKAGES="$CONFIG_PACKAGES" FILES="files" ROOTFS_PARTSIZE=1024 V=s 2>&1 | tee build.log
          
          # 检查编译错误
          if grep -qiE "(error|fail)" build.log; then
            echo "⚠️ 编译警告/错误:"
            grep -iE "(error|fail)" build.log | tail -20
          fi

      - name: Prepare artifacts
        run: |
          cd imagebuilder/bin/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}
          ls -lh *.img.gz 2>/dev/null || true
          sha256sum *.img.gz > sha256sums.txt 2>/dev/null || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86_64-firmware
          path: |
            imagebuilder/bin/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}/*combined-efi.img.gz
            imagebuilder/bin/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}/sha256sums.txt
          retention-days: 30
