name: Build ImmortalWrt x86_64 (Image Builder)

on:
  workflow_dispatch:

env:
  IMMORTALWRT_VERSION: "24.10-SNAPSHOT"
  DEVICE_TARGET: x86
  DEVICE_SUBTARGET: 64
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /opt/ghc /usr/share/dotnet /usr/local/lib/android
          sudo docker image prune -af || true

      - name: Install dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 \
            qemu-utils genisoimage zstd

      - name: Download Image Builder
        run: |
          IB_URL="https://downloads.immortalwrt.org/releases/${{ env.IMMORTALWRT_VERSION }}/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}"
          IB_NAME="immortalwrt-imagebuilder-${{ env.IMMORTALWRT_VERSION }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}.Linux-x86_64"
          wget -q "${IB_URL}/${IB_NAME}.tar.zst"
          tar -I zstd -xf ${IB_NAME}.tar.zst
          mv ${IB_NAME} imagebuilder

      - name: Configure Image Builder
        run: |
          cd imagebuilder
          cp -rf $GITHUB_WORKSPACE/files .
          chmod +x $GITHUB_WORKSPACE/scripts/*.sh
          bash $GITHUB_WORKSPACE/scripts/customize.sh

      - name: Build firmware
        run: |
          cd imagebuilder
          CONFIG_PACKAGES=$(cat $GITHUB_WORKSPACE/config/packages.config | grep -v '^#' | grep -v '^$' | tr -s "\n" " ")
          echo "安装的包: $CONFIG_PACKAGES"
          make image PACKAGES="$CONFIG_PACKAGES" FILES="files"

      - name: Prepare artifacts
        run: |
          cd imagebuilder/bin/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}
          ls -lh
          sha256sum *.img.gz > sha256sums.txt 2>/dev/null || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86_64-firmware
          path: |
            imagebuilder/bin/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}/*ext4-combined-efi.img.gz
            imagebuilder/bin/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}/*squashfs-combined-efi.img.gz
            imagebuilder/bin/targets/${{ env.DEVICE_TARGET }}/${{ env.DEVICE_SUBTARGET }}/sha256sums.txt
          retention-days: 30
